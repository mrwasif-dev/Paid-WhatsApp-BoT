<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>✦ Muzamil-MD • Premium Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           ROOT VARIABLES - NEW THEME
           ============================================ */
        :root {
            --primary: #6C3CE1;
            --primary-dark: #4A1FA6;
            --primary-light: #8B6BE6;
            --secondary: #FF6B9D;
            --accent: #00D4FF;
            --success: #00E676;
            --danger: #FF1744;
            --warning: #FFD600;
            
            --bg-start: #0a0a1a;
            --bg-end: #1a0a2e;
            --bg-card: rgba(255, 255, 255, 0.06);
            --bg-card-hover: rgba(255, 255, 255, 0.10);
            
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.7);
            --text-muted: rgba(255, 255, 255, 0.4);
            
            --border: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(108, 60, 225, 0.3);
            --shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
            --shadow-glow: 0 0 40px rgba(108, 60, 225, 0.15);
        }

        /* ============================================
           GLOBAL RESET
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(145deg, var(--bg-start), var(--bg-end));
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background Orbs */
        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            animation: floatOrb 8s ease-in-out infinite alternate;
        }
        body::before {
            width: 500px;
            height: 500px;
            background: var(--primary);
            top: -100px;
            right: -100px;
        }
        body::after {
            width: 400px;
            height: 400px;
            background: var(--secondary);
            bottom: -100px;
            left: -100px;
            animation-delay: 4s;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(80px, 80px) scale(1.2); }
        }

        /* ============================================
           MAIN CONTAINER
           ============================================ */
        .container {
            max-width: 520px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ============================================
           GLASS CARD
           ============================================ */
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 40px;
            padding: 36px 28px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow), var(--shadow-glow);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent), var(--primary));
            background-size: 300% 100%;
            animation: gradientMove 4s linear infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header .icon-wrapper {
            width: 80px;
            height: 80px;
            margin: 0 auto 16px;
            background: linear-gradient(145deg, var(--primary), var(--secondary));
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            color: #fff;
            box-shadow: 0 12px 40px rgba(108, 60, 225, 0.4);
            position: relative;
            transition: transform 0.3s ease;
        }

        .header .icon-wrapper:hover {
            transform: scale(1.05) rotate(-5deg);
        }

        .header .icon-wrapper .pulse-ring {
            position: absolute;
            inset: -4px;
            border-radius: 32px;
            border: 2px solid rgba(108, 60, 225, 0.3);
            animation: pulseRing 2s ease-out infinite;
        }

        @keyframes pulseRing {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .header h1 {
            font-size: 26px;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 30%, var(--primary-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 400;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* ============================================
           STATUS GRID - NEUMORPHISM CARDS
           ============================================ */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .status-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 18px 14px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .status-item::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, rgba(255,255,255,0.03), transparent);
            border-radius: 20px;
            pointer-events: none;
        }

        .status-item:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .status-item .label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 700;
            display: block;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }

        .status-item .value {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            position: relative;
            z-index: 1;
            color: var(--text-primary);
        }

        /* Status Dots */
        .status-item .value .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            position: relative;
        }

        .dot.online {
            background: var(--success);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.5);
            animation: dotPulse 2s ease-in-out infinite;
        }

        .dot.offline {
            background: var(--danger);
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.4);
        }

        .dot.connecting {
            background: var(--warning);
            box-shadow: 0 0 20px rgba(255, 214, 0, 0.4);
            animation: dotPulse 0.8s ease-in-out infinite;
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }

        /* ============================================
           DATABASE STATUS - GLASS BAR
           ============================================ */
        .db-status {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 20px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .db-status:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .db-status .db-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .db-status .db-info .db-icon {
            width: 40px;
            height: 40px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            background: linear-gradient(145deg, rgba(108, 60, 225, 0.2), rgba(255, 107, 157, 0.2));
            color: var(--primary-light);
        }

        .db-status .db-info .db-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .db-status .db-info .db-label small {
            display: block;
            font-weight: 400;
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 2px;
        }

        .db-status .db-badge {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }

        .db-badge.connected {
            background: rgba(0, 230, 118, 0.15);
            color: var(--success);
            border: 1px solid rgba(0, 230, 118, 0.2);
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.05);
        }

        .db-badge.disconnected {
            background: rgba(255, 23, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 23, 68, 0.2);
        }

        .db-badge.connecting {
            background: rgba(255, 214, 0, 0.15);
            color: var(--warning);
            border: 1px solid rgba(255, 214, 0, 0.2);
        }

        /* ============================================
           QR CODE SECTION - WITH GLOW
           ============================================ */
        .qr-section {
            text-align: center;
            padding: 24px 0;
            margin-bottom: 16px;
            position: relative;
        }

        .qr-section .qr-wrapper {
            display: inline-block;
            background: rgba(255, 255, 255, 0.05);
            padding: 16px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 60px rgba(108, 60, 225, 0.08);
            transition: all 0.4s ease;
            position: relative;
        }

        .qr-section .qr-wrapper::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 30px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
            filter: blur(10px);
        }

        .qr-section .qr-wrapper:hover::before {
            opacity: 0.3;
        }

        .qr-section .qr-wrapper img {
            width: 200px;
            height: 200px;
            display: block;
            border-radius: 16px;
            background: #fff;
        }

        .qr-section .qr-wrapper .qr-placeholder {
            width: 200px;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 2px dashed rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            padding: 30px;
            flex-direction: column;
            gap: 12px;
        }

        .qr-section .qr-wrapper .qr-placeholder i {
            font-size: 48px;
            color: rgba(255, 255, 255, 0.1);
        }

        .qr-section .qr-hint {
            margin-top: 16px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .qr-section .qr-hint i {
            color: var(--accent);
            margin-right: 6px;
        }

        /* ============================================
           SESSION INFO - MINIMAL
           ============================================ */
        .session-info {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 14px 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .session-info .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        .session-info .row:last-child {
            border-bottom: none;
        }

        .session-info .row .label {
            color: var(--text-muted);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .session-info .row .value {
            font-weight: 600;
            font-size: 12px;
            color: var(--text-secondary);
            max-width: 60%;
            text-align: right;
            word-break: break-all;
        }

        .session-info .row .value.code {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.04);
            padding: 2px 10px;
            border-radius: 8px;
        }

        /* ============================================
           BUTTONS - GLASS / NEUMORPHISM
           ============================================ */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        .btn {
            flex: 1;
            padding: 16px 20px;
            border: none;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* Restart Button - Gradient */
        .btn-restart {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            box-shadow: 0 8px 30px rgba(108, 60, 225, 0.3);
        }

        .btn-restart:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(108, 60, 225, 0.5);
        }

        .btn-restart:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-restart .spinner {
            border-color: rgba(255,255,255,0.2);
            border-top-color: #fff;
        }

        /* Refresh Button - Glass */
        .btn-refresh {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        .btn-refresh:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-3px);
        }

        /* Logout Button - Danger Glass */
        .btn-logout {
            background: rgba(255, 23, 68, 0.10);
            color: var(--danger);
            border: 1px solid rgba(255, 23, 68, 0.15);
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .btn-logout:hover {
            background: rgba(255, 23, 68, 0.20);
            transform: translateY(-2px);
        }

        /* ============================================
           SPINNER
           ============================================ */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255,255,255,0.2);
            border-top: 2.5px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .spinner.dark {
            border-color: rgba(0,0,0,0.1);
            border-top-color: var(--primary);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           TOAST NOTIFICATION
           ============================================ */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            padding: 16px 28px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow), var(--shadow-glow);
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
            z-index: 999;
            max-width: 90%;
            text-align: center;
            opacity: 0;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .toast.success {
            border-color: rgba(0, 230, 118, 0.3);
            color: var(--success);
        }

        .toast.error {
            border-color: rgba(255, 23, 68, 0.3);
            color: var(--danger);
        }

        .toast.warning {
            border-color: rgba(255, 214, 0, 0.3);
            color: var(--warning);
        }

        .toast.info {
            border-color: rgba(0, 212, 255, 0.3);
            color: var(--accent);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            text-align: center;
            padding: 20px 0 8px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .footer i {
            color: var(--secondary);
            animation: heartBeat 1.5s ease-in-out infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .footer a {
            color: var(--primary-light);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--accent);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .card {
                padding: 24px 16px;
                border-radius: 32px;
            }

            .status-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .status-item {
                padding: 14px 10px;
                border-radius: 16px;
            }

            .status-item .value {
                font-size: 13px;
            }

            .qr-section .qr-wrapper img,
            .qr-section .qr-wrapper .qr-placeholder {
                width: 160px;
                height: 160px;
            }

            .btn-group {
                flex-direction: column;
            }

            .btn {
                padding: 15px 16px;
                border-radius: 16px;
            }

            .header h1 {
                font-size: 22px;
            }

            .header .icon-wrapper {
                width: 64px;
                height: 64px;
                font-size: 30px;
                border-radius: 22px;
            }

            .db-status {
                padding: 14px 16px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .session-info .row .value {
                max-width: 50%;
                font-size: 11px;
            }
        }

        @media (max-width: 380px) {
            .status-grid {
                grid-template-columns: 1fr 1fr;
                gap: 8px;
            }

            .status-item {
                padding: 12px 8px;
            }

            .status-item .label {
                font-size: 9px;
            }

            .status-item .value {
                font-size: 12px;
            }

            .qr-section .qr-wrapper img,
            .qr-section .qr-wrapper .qr-placeholder {
                width: 140px;
                height: 140px;
            }
        }
    </style>
</head>
<body>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <div class="container">
        <!-- Main Card -->
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="icon-wrapper">
                    <span class="pulse-ring"></span>
                    <i class="fas fa-bolt"></i>
                </div>
                <h1>Muzamil <span>MD</span></h1>
                <p>✦ Premium WhatsApp Bot ✦</p>
            </div>

            <!-- Status Grid -->
            <div class="status-grid">
                <div class="status-item">
                    <span class="label"><i class="fas fa-circle" style="font-size:8px;margin-right:4px;color:var(--accent);"></i> Bot Status</span>
                    <div class="value" id="botStatus">
                        <span class="dot connecting"></span>
                        <span id="statusText">Connecting...</span>
                    </div>
                </div>
                <div class="status-item">
                    <span class="label"><i class="fas fa-fingerprint" style="font-size:10px;margin-right:4px;"></i> Session</span>
                    <div class="value" id="sessionId" style="font-size:12px; font-weight:600; color:var(--text-secondary);">
                        <span id="sessionIdText">Loading...</span>
                    </div>
                </div>
            </div>

            <!-- Database Status -->
            <div class="db-status" id="dbStatus">
                <div class="db-info">
                    <div class="db-icon">
                        <i class="fas fa-database"></i>
                    </div>
                    <div class="db-label">
                        Database
                        <small id="dbHost">MongoDB</small>
                    </div>
                </div>
                <span class="db-badge connecting" id="dbBadge">
                    <i class="fas fa-spinner fa-spin"></i> Checking...
                </span>
            </div>

            <!-- QR Code -->
            <div class="qr-section" id="qrSection">
                <div class="qr-wrapper">
                    <img id="qrImage" src="" alt="QR Code" style="display:none;">
                    <div class="qr-placeholder" id="qrPlaceholder">
                        <i class="fas fa-qrcode"></i>
                        <span>Scan to Connect</span>
                    </div>
                </div>
                <div class="qr-hint" id="qrHint">
                    <i class="fas fa-phone"></i> WhatsApp → Linked Devices → Link a Device
                </div>
            </div>

            <!-- Session Info -->
            <div class="session-info">
                <div class="row">
                    <span class="label">Session ID</span>
                    <span class="value code" id="sessionIdDisplay">-</span>
                </div>
                <div class="row">
                    <span class="label">Phone Number</span>
                    <span class="value" id="phoneNumber">-</span>
                </div>
                <div class="row">
                    <span class="label">Last Active</span>
                    <span class="value" id="lastActive">-</span>
                </div>
            </div>

            <!-- Buttons -->
            <div class="btn-group">
                <button class="btn btn-restart" id="restartBtn" onclick="restartBot()">
                    <i class="fas fa-sync-alt"></i> Restart Bot
                </button>
                <button class="btn btn-refresh" onclick="refreshStatus()">
                    <i class="fas fa-rotate"></i> Refresh
                </button>
            </div>
            <div style="margin-top:12px;">
                <button class="btn btn-logout" onclick="logoutBot()">
                    <i class="fas fa-sign-out-alt"></i> Logout Session
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Made with <i class="fas fa-heart"></i> by <a href="#">Muzamil</a> • v2.0
        </div>
    </div>

    <script>
        // ============================================
        // JAVASCRIPT
        // ============================================
        let statusInterval = null;

        // Show Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            setTimeout(() => toast.classList.add('show'), 10);
            clearTimeout(toast._hideTimeout);
            toast._hideTimeout = setTimeout(() => toast.classList.remove('show'), 4500);
        }

        // Fetch Status
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // Update Bot Status
                const dot = document.querySelector('#botStatus .dot');
                const statusText = document.getElementById('statusText');

                if (data.connected) {
                    dot.className = 'dot online';
                    statusText.textContent = 'Online';
                } else if (data.qr) {
                    dot.className = 'dot connecting';
                    statusText.textContent = 'Scan QR';
                } else {
                    dot.className = 'dot offline';
                    statusText.textContent = 'Offline';
                }

                // Update Session ID
                document.getElementById('sessionIdText').textContent = data.sessionId || 'N/A';
                document.getElementById('sessionIdDisplay').textContent = data.sessionId || '-';

                // Update QR Code
                const qrImg = document.getElementById('qrImage');
                const qrPlaceholder = document.getElementById('qrPlaceholder');
                if (data.qr) {
                    qrImg.src = data.qr;
                    qrImg.style.display = 'block';
                    qrPlaceholder.style.display = 'none';
                    document.getElementById('qrHint').innerHTML = '<i class="fas fa-check-circle" style="color:var(--success);"></i> QR ready! Scan with WhatsApp';
                } else {
                    qrImg.style.display = 'none';
                    qrPlaceholder.style.display = 'flex';
                    if (data.connected) {
                        document.getElementById('qrHint').innerHTML = '<i class="fas fa-check-circle" style="color:var(--success);"></i> Bot is connected!';
                    } else {
                        document.getElementById('qrHint').innerHTML = '<i class="fas fa-clock"></i> Waiting for QR...';
                    }
                }

                // Update Phone
                const phoneEl = document.getElementById('phoneNumber');
                phoneEl.textContent = data.phoneNumber || (data.connected ? 'Connected ✅' : '-');

                // Update Last Active
                document.getElementById('lastActive').textContent = data.lastActive ? new Date(data.lastActive).toLocaleString() : new Date().toLocaleString();

                // Update Database Status
                updateDatabaseStatus(data);

                // Enable restart button
                document.getElementById('restartBtn').disabled = false;

                return data;

            } catch (error) {
                console.error('Error fetching status:', error);
                document.querySelector('#botStatus .dot').className = 'dot offline';
                document.getElementById('statusText').textContent = 'Error';
                showToast('Failed to fetch status', 'error');
                return null;
            }
        }

        // Update Database Status
        function updateDatabaseStatus(data) {
            const dbBadge = document.getElementById('dbBadge');
            const dbHost = document.getElementById('dbHost');

            const isDbConnected = data.dbConnected || false;
            const isDbConfigured = data.dbConfigured || false;

            if (isDbConnected) {
                dbBadge.className = 'db-badge connected';
                dbBadge.innerHTML = '<i class="fas fa-check-circle"></i> Connected';
                dbHost.textContent = 'MongoDB • Active';
            } else if (isDbConfigured) {
                dbBadge.className = 'db-badge connecting';
                dbBadge.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
                dbHost.textContent = 'MongoDB • Connecting';
            } else {
                dbBadge.className = 'db-badge disconnected';
                dbBadge.innerHTML = '<i class="fas fa-times-circle"></i> Disabled';
                dbHost.textContent = 'MongoDB • Not Configured';
            }
        }

        // Refresh Status
        function refreshStatus() {
            const btn = document.querySelector('.btn-refresh');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            fetchStatus().finally(() => {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                showToast('Status updated!', 'info');
            });
        }

        // Restart Bot
        async function restartBot() {
            const btn = document.getElementById('restartBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> Restarting...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/restart', { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    showToast('⚡ Bot restarting... Please wait 5-10 seconds', 'success');
                    setTimeout(() => {
                        fetchStatus();
                        showToast('✅ Bot restarted successfully!', 'success');
                    }, 5000);
                } else {
                    showToast('❌ Restart failed: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showToast('❌ Restart request failed: ' + error.message, 'error');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        // Logout Bot
        async function logoutBot() {
            if (!confirm('⚠️ Are you sure you want to logout? This will disconnect the bot.')) return;

            const btn = document.querySelector('.btn-logout');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging out...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/logout', { method: 'POST' });
                const data = await res.json();

                if (data.success) {
                    showToast('👋 Logged out successfully!', 'success');
                    setTimeout(() => fetchStatus(), 2000);
                } else {
                    showToast('❌ Logout failed: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showToast('❌ Logout request failed: ' + error.message, 'error');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        // Auto-refresh every 10 seconds
        function startAutoRefresh() {
            if (statusInterval) clearInterval(statusInterval);
            fetchStatus();
            statusInterval = setInterval(fetchStatus, 10000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', startAutoRefresh);

        // Refresh on visibility change
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                fetchStatus();
            }
        });
    </script>

</body>
</html>
