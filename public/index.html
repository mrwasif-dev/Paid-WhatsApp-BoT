<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Bot - QR & Pair Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header .logo {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #25D366, #128C7E);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 16px;
            margin-top: 8px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-badge.connected {
            background: rgba(37, 211, 102, 0.2);
            border-color: #25D366;
            color: #25D366;
        }

        .status-badge.disconnected {
            background: rgba(255, 68, 68, 0.2);
            border-color: #ff4444;
            color: #ff4444;
        }

        .methods-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        .method-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        .method-card:hover {
            transform: translateY(-5px);
            border-color: rgba(37, 211, 102, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .method-card .icon {
            font-size: 40px;
            margin-bottom: 15px;
            display: block;
        }

        .method-card h3 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .method-card p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .qr-container {
            text-align: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
        }

        .qr-container img {
            max-width: 200px;
            height: auto;
            border-radius: 10px;
        }

        .qr-placeholder {
            padding: 40px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-group input {
            padding: 14px 18px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #25D366;
            background: rgba(255, 255, 255, 0.08);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: #fff;
        }

        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pair-code-display {
            margin-top: 15px;
            padding: 20px;
            background: rgba(37, 211, 102, 0.1);
            border-radius: 12px;
            border: 2px solid #25D366;
            text-align: center;
            display: none;
        }

        .pair-code-display.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        .pair-code-display .code {
            font-size: 36px;
            font-weight: 800;
            color: #25D366;
            letter-spacing: 8px;
            font-family: 'Courier New', monospace;
        }

        .pair-code-display .instruction {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-top: 10px;
        }

        .footer-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .footer-actions .btn {
            padding: 10px 20px;
            font-size: 14px;
        }

        .btn-danger {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        .btn-success {
            background: rgba(37, 211, 102, 0.2);
            color: #25D366;
            border: 1px solid rgba(37, 211, 102, 0.3);
        }

        .btn-success:hover {
            background: rgba(37, 211, 102, 0.3);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: #25D366;
            animation: spin 0.8s ease infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.4s ease;
            max-width: 400px;
            border-left: 4px solid #25D366;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.error {
            border-left-color: #ff4444;
        }

        .toast.warning {
            border-left-color: #ffa500;
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .methods-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .pair-code-display .code {
                font-size: 28px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🤖</div>
            <h1>WhatsApp Bot Manager</h1>
            <p>Connect your bot using QR Code or Pair Code</p>
            <div id="statusBadge" class="status-badge disconnected">
                <i class="fas fa-circle"></i> Disconnected
            </div>
        </div>

        <!-- Methods Grid -->
        <div class="methods-grid">
            <!-- QR Code Method -->
            <div class="method-card">
                <span class="icon">📱</span>
                <h3>QR Code</h3>
                <p>Scan with WhatsApp Web to connect instantly</p>
                <div class="qr-container" id="qrContainer">
                    <div id="qrDisplay">
                        <div class="qr-placeholder">
                            <i class="fas fa-qrcode" style="font-size: 48px; display: block; margin-bottom: 10px;"></i>
                            <span>
