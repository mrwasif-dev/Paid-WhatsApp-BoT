<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Muzamil-MD • Bot Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           NEW THEME - DARK LUXURY
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: #0f0f1a;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 10% 20%, rgba(120, 80, 255, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 90% 80%, rgba(255, 100, 150, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 200, 255, 0.05) 0%, transparent 70%);
            z-index: 0;
        }

        /* Floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }

        /* ============================================
           MAIN CONTAINER
           ============================================ */
        .container {
            max-width: 480px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ============================================
           CARD - NEW DESIGN
           ============================================ */
        .card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        /* Gradient top bar */
        .card-topbar {
            height: 4px;
            background: linear-gradient(90deg, #7c3aed, #ec4899, #06b6d4, #7c3aed);
            background-size: 300% 100%;
            animation: barMove 4s linear infinite;
        }

        @keyframes barMove {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }

        /* ============================================
           CARD BODY
           ============================================ */
        .card-body {
            padding: 28px 24px 24px;
        }

        /* ============================================
           HEADER - NEW
           ============================================ */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-left .avatar {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3);
            position: relative;
        }

        .header-left .avatar .status-ring {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 14px;
            height: 14px;
            background: #22c55e;
            border-radius: 50%;
            border: 2px solid #0f0f1a;
            box-shadow: 0 0 16px rgba(34, 197, 94, 0.4);
            animation: ringPulse 2s ease-in-out infinite;
        }

        @keyframes ringPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .header-left .info h2 {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .header-left .info p {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-right .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(34, 197, 94, 0.15);
            color: #22c55e;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        .header-right .badge.offline {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.2);
        }

        .header-right .badge.scan {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
            border-color: rgba(251, 191, 36, 0.2);
        }

        /* ============================================
           STATS - NEW ROW
           ============================================ */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 24px;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 14px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.04);
            transition: all 0.3s ease;
        }

        .stat-box:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-2px);
        }

        .stat-box .num {
            font-size: 20px;
            font-weight: 800;
            color: #fff;
            line-height: 1.2;
        }

        .stat-box .num.green { color: #22c55e; }
        .stat-box .num.pink { color: #ec4899; }
        .stat-box .num.blue { color: #06b6d4; }

        .stat-box .label {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.35);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
            margin-top: 4px;
            display: block;
        }

        /* ============================================
           QR - NEW DESIGN
           ============================================ */
        .qr-wrap {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            position: relative;
            overflow: hidden;
        }

        .qr-wrap::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(124, 58, 237, 0.03), transparent 60%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .qr-wrap .qr-inner {
            position: relative;
            z-index: 1;
        }

        .qr-wrap .qr-inner img {
            width: 160px;
            height: 160px;
            border-radius: 16px;
            background: #fff;
            padding: 8px;
            display: inline-block;
        }

        .qr-wrap .qr-inner .placeholder {
            width: 160px;
            height: 160px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            border: 2px dashed rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.2);
        }

        .qr-wrap .qr-inner .placeholder i {
            font-size: 48px;
            margin-bottom: 8px;
        }

        .qr-wrap .qr-inner .placeholder span {
            font-size: 12px;
            font-weight: 500;
        }

        .qr-hint {
            margin-top: 12px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 500;
            letter-spacing: 0.3px;
            position: relative;
            z-index: 1;
        }

        .qr-hint i {
            color: #06b6d4;
            margin-right: 6px;
        }

        /* ============================================
           SESSION - NEW
           ============================================ */
        .session-bar {
            display: flex;
            justify-content: space-between;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            flex-wrap: wrap;
            gap: 4px;
        }

        .session-bar .item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .session-bar .item .lbl {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .session-bar .item .val {
            font-size: 11px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.7);
        }

        .session-bar .item .val.code {
            font-family: 'Monaco', monospace;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* ============================================
           BUTTONS - NEW
           ============================================ */
        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 14px 16px;
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #ec4899);
            color: #fff;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.25);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 32px rgba(124, 58, 237, 0.4);
            transform: translateY(-2px);
        }

        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.12);
            width: 100%;
            margin-top: 10px;
            flex: none;
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.18);
            transform: translateY(-2px);
        }

        .btn .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           TOAST
           ============================================ */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 14px 28px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            max-width: 90%;
            text-align: center;
            opacity: 0;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .toast.success { border-left: 3px solid #22c55e; }
        .toast.error { border-left: 3px solid #ef4444; }
        .toast.warning { border-left: 3px solid #fbbf24; }
        .toast.info { border-left: 3px solid #06b6d4; }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            text-align: center;
            padding: 16px 0 0;
            color: rgba(255, 255, 255, 0.15);
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .footer i {
            color: #ec4899;
        }

        .footer a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .card-body { padding: 20px 16px 18px; }
            .stats { gap: 8px; }
            .stat-box { padding: 12px 6px; }
            .stat-box .num { font-size: 17px; }
            .qr-wrap .qr-inner img,
            .qr-wrap .qr-inner .placeholder { width: 140px; height: 140px; }
            .btn-row { flex-direction: column; }
            .header-left .avatar { width: 44px; height: 44px; font-size: 18px; }
            .header-left .info h2 { font-size: 16px; }
            .session-bar { padding: 10px 14px; }
            .session-bar .item .val { font-size: 10px; }
        }

        @media (max-width: 380px) {
            .stats { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .stat-box { padding: 10px 4px; }
            .stat-box .num { font-size: 15px; }
            .qr-wrap .qr-inner img,
            .qr-wrap .qr-inner .placeholder { width: 120px; height: 120px; }
            .header-right .badge { font-size: 8px; padding: 4px 10px; }
        }
    </style>
</head>
<body>

    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <div class="container">

        <div class="card">
            <!-- Top Bar -->
            <div class="card-topbar"></div>

            <div class="card-body">

                <!-- ===== HEADER ===== -->
                <div class="header">
                    <div class="header-left">
                        <div class="avatar">
                            <i class="fas fa-bolt"></i>
                            <span class="status-ring" id="statusRing"></span>
                        </div>
                        <div class="info">
                            <h2>Muzamil MD</h2>
                            <p>WhatsApp Bot</p>
                        </div>
                    </div>
                    <div class="header-right">
                        <span class="badge" id="statusBadge">● Online</span>
                    </div>
                </div>

                <!-- ===== STATS ===== -->
                <div class="stats">
                    <div class="stat-box">
                        <div class="num green" id="statStatus">●</div>
                        <span class="label">Status</span>
                    </div>
                    <div class="stat-box">
                        <div class="num pink" id="statDb">⬡</div>
                        <span class="label">Database</span>
                    </div>
                    <div class="stat-box">
                        <div class="num blue" id="statTime">0s</div>
                        <span class="label">Uptime</span>
                    </div>
                </div>

                <!-- ===== QR ===== -->
                <div class="qr-wrap">
                    <div class="qr-inner">
                        <img id="qrImage" src="" alt="QR" style="display:none;">
                        <div class="placeholder" id="qrPlaceholder">
                            <i class="fas fa-qrcode"></i>
                            <span>Scan to Connect</span>
                        </div>
                    </div>
                    <div class="qr-hint" id="qrHint">
                        <i class="fas fa-phone"></i> WhatsApp → Linked Devices → Link a Device
                    </div>
                </div>

                <!-- ===== SESSION ===== -->
                <div class="session-bar">
                    <div class="item">
                        <span class="lbl">Session</span>
                        <span class="val code" id="sessionDisplay">-</span>
                    </div>
                    <div class="item">
                        <span class="lbl">Device</span>
                        <span class="val" id="deviceDisplay">-</span>
                    </div>
                    <div class="item">
                        <span class="lbl">Active</span>
                        <span class="val" id="activeDisplay">-</span>
                    </div>
                </div>

                <!-- ===== BUTTONS ===== -->
                <div class="btn-row">
                    <button class="btn btn-primary" id="restartBtn" onclick="restartBot()">
                        <i class="fas fa-sync-alt"></i> Restart
                    </button>
                    <button class="btn btn-secondary" onclick="refreshStatus()">
                        <i class="fas fa-rotate"></i>
                    </button>
                </div>
                <button class="btn btn-danger" onclick="logoutBot()">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>

                <!-- ===== FOOTER ===== -->
                <div class="footer">
                    Made with <i class="fas fa-heart"></i> by <a href="#">Muzamil</a>
                </div>

            </div>
        </div>

    </div>

    <script>
        // ============================================
        // PARTICLES
        // ============================================
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.width = (Math.random() * 3 + 2) + 'px';
                p.style.height = p.style.width;
                p.style.animationDuration = (Math.random() * 15 + 10) + 's';
                p.style.animationDelay = (Math.random() * 20) + 's';
                container.appendChild(p);
            }
        })();

        // ============================================
        // MAIN
        // ============================================
        let statusInterval = null;
        let startTime = Date.now();

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast ${type}`;
            setTimeout(() => t.classList.add('show'), 10);
            clearTimeout(t._hide);
            t._hide = setTimeout(() => t.classList.remove('show'), 4000);
        }

        function formatTime(s) {
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = Math.floor(s % 60);
            if (h > 0) return h + 'h ' + m + 'm';
            if (m > 0) return m + 'm ' + sec + 's';
            return sec + 's';
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // --- Badge ---
                const badge = document.getElementById('statusBadge');
                const ring = document.getElementById('statusRing');
                let text, cls;

                if (data.connected) {
                    text = '● Online';
                    cls = '';
                    ring.style.background = '#22c55e';
                    ring.style.boxShadow = '0 0 16px rgba(34,197,94,0.4)';
                } else if (data.qr) {
                    text = '◉ Scan';
                    cls = 'scan';
                    ring.style.background = '#fbbf24';
                    ring.style.boxShadow = '0 0 16px rgba(251,191,36,0.4)';
                } else {
                    text = '○ Offline';
                    cls = 'offline';
                    ring.style.background = '#ef4444';
                    ring.style.boxShadow = '0 0 16px rgba(239,68,68,0.4)';
                }

                badge.textContent = text;
                badge.className = 'badge' + (cls ? ' ' + cls : '');

                // --- Stats ---
                document.getElementById('statStatus').textContent = data.connected ? '🟢' : '🔴';
                document.getElementById('statDb').textContent = data.dbConnected ? '✅' : '❌';
                document.getElementById('statTime').textContent = formatTime(Math.floor((Date.now() - startTime) / 1000));

                // --- QR ---
                const img = document.getElementById('qrImage');
                const ph = document.getElementById('qrPlaceholder');
                const hint = document.getElementById('qrHint');

                if (data.qr) {
                    img.src = data.qr;
                    img.style.display = 'inline-block';
                    ph.style.display = 'none';
                    hint.innerHTML = '<i class="fas fa-check-circle" style="color:#22c55e;"></i> QR ready! Scan with WhatsApp';
                } else {
                    img.style.display = 'none';
                    ph.style.display = 'flex';
                    if (data.connected) {
                        hint.innerHTML = '<i class="fas fa-check-circle" style="color:#22c55e;"></i> Bot is connected!';
                    } else {
                        hint.innerHTML = '<i class="fas fa-clock"></i> Waiting for QR code...';
                    }
                }

                // --- Session ---
                document.getElementById('sessionDisplay').textContent = data.sessionId || '-';
                document.getElementById('deviceDisplay').textContent = data.connected ? '✅ Connected' : '-';
                document.getElementById('activeDisplay').textContent = data.lastActive ? new Date(data.lastActive).toLocaleTimeString() : '-';

                // --- Enable restart ---
                document.getElementById('restartBtn').disabled = false;

                return data;

            } catch (e) {
                console.error(e);
                document.getElementById('statusBadge').textContent = '⚠ Error';
                document.getElementById('statusBadge').className = 'badge offline';
                showToast('Failed to fetch status', 'error');
                return null;
            }
        }

        function refreshStatus() {
            const btn = document.querySelector('.btn-secondary');
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;
            fetchStatus().finally(() => {
                btn.innerHTML = orig;
                btn.disabled = false;
                showToast('Status updated', 'info');
            });
        }

        async function restartBot() {
            const btn = document.getElementById('restartBtn');
            const orig = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> Restarting...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/restart', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('⚡ Bot restarting...', 'success');
                    setTimeout(() => {
                        fetchStatus();
                        showToast('✅ Bot restarted!', 'success');
                    }, 5000);
                } else {
                    showToast('❌ Failed: ' + (data.error || 'Unknown'), 'error');
                }
            } catch (e) {
                showToast('❌ Request failed', 'error');
            } finally {
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        }

        async function logoutBot() {
            if (!confirm('⚠️ Logout will disconnect the bot. Continue?')) return;
            const btn = document.querySelector('.btn-danger');
            const orig = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging out...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/logout', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('👋 Logged out', 'success');
                    setTimeout(fetchStatus, 2000);
                } else {
                    showToast('❌ Logout failed', 'error');
                }
            } catch (e) {
                showToast('❌ Request failed', 'error');
            } finally {
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        }

        function startAutoRefresh() {
            if (statusInterval) clearInterval(statusInterval);
            fetchStatus();
            statusInterval = setInterval(fetchStatus, 10000);
        }

        document.addEventListener('DOMContentLoaded', startAutoRefresh);
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) fetchStatus();
        });
    </script>

</body>
</html>
