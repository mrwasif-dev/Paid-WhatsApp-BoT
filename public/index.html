<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Muzamil-MD • WhatsApp Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           ROOT - SOFT & ELEGANT THEME
           ============================================ */
        :root {
            --primary: #2D3436;
            --primary-light: #636E72;
            --secondary: #FD79A8;
            --accent: #00CEC9;
            --gradient-start: #DFE6E9;
            --gradient-end: #B2BEC3;
            
            --bg: #F8F9FA;
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            --card-border: rgba(255, 255, 255, 0.3);
            
            --text-primary: #2D3436;
            --text-secondary: #636E72;
            --text-muted: #B2BEC3;
            
            --success: #00B894;
            --danger: #E17055;
            --warning: #FDCB6E;
            
            --radius: 24px;
            --radius-sm: 16px;
        }

        /* ============================================
           GLOBAL
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(145deg, #F8F9FA 0%, #E8ECEF 100%);
            position: relative;
        }

        /* Subtle background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(0, 206, 201, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(253, 121, 168, 0.05) 0%, transparent 50%);
            z-index: 0;
        }

        /* ============================================
           CONTAINER
           ============================================ */
        .container {
            max-width: 520px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ============================================
           CARD
           ============================================ */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 32px 28px 28px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--card-border);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent), var(--secondary), var(--accent));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Decorative circle */
        .card::after {
            content: '';
            position: absolute;
            bottom: -80px;
            right: -80px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 206, 201, 0.08), rgba(253, 121, 168, 0.08));
            pointer-events: none;
        }

        /* ============================================
           HEADER
           ============================================ */
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            position: relative;
            z-index: 1;
        }

        .header .logo {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--accent), #00B894);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 8px 24px rgba(0, 206, 201, 0.25);
        }

        .header .title-group h1 {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        .header .title-group h1 span {
            color: var(--accent);
            font-weight: 900;
        }

        .header .title-group p {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* ============================================
           STATUS BADGE - TOP RIGHT
           ============================================ */
        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px 6px 10px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.06);
            color: var(--text-secondary);
        }

        .status-badge .dot-mini {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-mini.online {
            background: var(--success);
            animation: pulse 1.5s ease-in-out infinite;
        }
        .dot-mini.offline {
            background: var(--danger);
        }
        .dot-mini.connecting {
            background: var(--warning);
            animation: pulse 0.8s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.7); }
        }

        /* ============================================
           STATS ROW - MODERN CARDS
           ============================================ */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 24px;
            position: relative;
            z-index: 1;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.02);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.04);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(0, 0, 0, 0.04);
            transform: translateY(-2px);
        }

        .stat-card .stat-icon {
            font-size: 18px;
            color: var(--accent);
            margin-bottom: 4px;
            display: block;
        }

        .stat-card .stat-number {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .stat-card .stat-label {
            font-size: 10px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            margin-top: 2px;
        }

        /* ============================================
           QR SECTION - CLEAN & CENTERED
           ============================================ */
        .qr-section {
            text-align: center;
            padding: 12px 0 16px;
            position: relative;
            z-index: 1;
        }

        .qr-section .qr-frame {
            display: inline-block;
            background: #fff;
            padding: 16px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
            transition: all 0.3s ease;
        }

        .qr-section .qr-frame:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            transform: scale(1.01);
        }

        .qr-section .qr-frame img {
            width: 180px;
            height: 180px;
            display: block;
            border-radius: 12px;
        }

        .qr-section .qr-frame .placeholder {
            width: 180px;
            height: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #F8F9FA;
            border-radius: 12px;
            border: 2px dashed rgba(0, 0, 0, 0.06);
            color: var(--text-muted);
            gap: 10px;
        }

        .qr-section .qr-frame .placeholder i {
            font-size: 40px;
            opacity: 0.3;
        }

        .qr-section .qr-frame .placeholder span {
            font-size: 13px;
            font-weight: 500;
        }

        .qr-hint {
            margin-top: 14px;
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .qr-hint i {
            color: var(--accent);
            margin-right: 6px;
        }

        .qr-hint .highlight {
            color: var(--text-primary);
            font-weight: 600;
        }

        /* ============================================
           SESSION INFO - MINIMAL LIST
           ============================================ */
        .session-info {
            background: rgba(0, 0, 0, 0.02);
            border-radius: var(--radius-sm);
            padding: 14px 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            position: relative;
            z-index: 1;
        }

        .session-info .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            font-size: 13px;
        }

        .session-info .row + .row {
            border-top: 1px solid rgba(0, 0, 0, 0.04);
        }

        .session-info .row .label {
            color: var(--text-secondary);
            font-weight: 500;
        }

        .session-info .row .value {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 12px;
            max-width: 60%;
            text-align: right;
            word-break: break-all;
        }

        .session-info .row .value.code {
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 10px;
            color: var(--text-muted);
            background: rgba(0, 0, 0, 0.04);
            padding: 2px 12px;
            border-radius: 6px;
        }

        /* ============================================
           BUTTONS - MODERN & CLEAN
           ============================================ */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 4px;
            position: relative;
            z-index: 1;
        }

        .btn {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Primary - Restart */
        .btn-restart {
            background: linear-gradient(135deg, var(--accent), #00B894);
            color: #fff;
            box-shadow: 0 4px 16px rgba(0, 206, 201, 0.25);
        }

        .btn-restart:hover {
            box-shadow: 0 8px 28px rgba(0, 206, 201, 0.35);
            transform: translateY(-2px);
        }

        .btn-restart:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Secondary - Refresh */
        .btn-refresh {
            background: rgba(0, 0, 0, 0.04);
            color: var(--text-secondary);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }

        .btn-refresh:hover {
            background: rgba(0, 0, 0, 0.08);
            transform: translateY(-2px);
        }

        /* Danger - Logout */
        .btn-logout {
            background: rgba(225, 112, 85, 0.08);
            color: var(--danger);
            border: 1px solid rgba(225, 112, 85, 0.12);
            width: 100%;
            margin-top: 10px;
        }

        .btn-logout:hover {
            background: rgba(225, 112, 85, 0.15);
            transform: translateY(-2px);
        }

        .btn .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .btn .spinner.dark {
            border-color: rgba(0,0,0,0.1);
            border-top-color: var(--text-secondary);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ============================================
           TOAST
           ============================================ */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #fff;
            backdrop-filter: blur(20px);
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            font-size: 14px;
            font-weight: 600;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            max-width: 90%;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            border: 1px solid rgba(0, 0, 0, 0.04);
            color: var(--text-primary);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }

        .toast.success {
            border-left: 4px solid var(--success);
        }
        .toast.error {
            border-left: 4px solid var(--danger);
        }
        .toast.warning {
            border-left: 4px solid var(--warning);
        }
        .toast.info {
            border-left: 4px solid var(--accent);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            text-align: center;
            padding: 18px 0 4px;
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.3px;
            position: relative;
            z-index: 1;
        }

        .footer i {
            color: var(--secondary);
            animation: heart 1.4s ease-in-out infinite;
        }

        @keyframes heart {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }

        .footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }

        .footer a:hover {
            color: var(--secondary);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .card {
                padding: 24px 16px 20px;
                border-radius: 20px;
            }

            .header .logo {
                width: 48px;
                height: 48px;
                font-size: 22px;
                border-radius: 14px;
            }

            .header .title-group h1 {
                font-size: 19px;
            }

            .stats-row {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 8px;
            }

            .stat-card {
                padding: 12px 8px;
                border-radius: 12px;
            }

            .stat-card .stat-number {
                font-size: 16px;
            }

            .stat-card .stat-label {
                font-size: 9px;
            }

            .qr-section .qr-frame img,
            .qr-section .qr-frame .placeholder {
                width: 150px;
                height: 150px;
            }

            .qr-section .qr-frame {
                padding: 12px;
                border-radius: 16px;
            }

            .btn-group {
                flex-direction: column;
                gap: 8px;
            }

            .btn {
                padding: 13px 16px;
                border-radius: 14px;
                font-size: 13px;
            }

            .btn-logout {
                margin-top: 8px;
            }

            .session-info {
                padding: 12px 14px;
            }

            .session-info .row {
                font-size: 12px;
            }

            .status-badge {
                top: 16px;
                right: 16px;
                padding: 4px 12px 4px 8px;
                font-size: 10px;
            }
        }

        @media (max-width: 380px) {
            .stats-row {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }

            .stat-card {
                padding: 10px 6px;
            }

            .stat-card .stat-number {
                font-size: 14px;
            }

            .qr-section .qr-frame img,
            .qr-section .qr-frame .placeholder {
                width: 130px;
                height: 130px;
            }

            .header .logo {
                width: 42px;
                height: 42px;
                font-size: 18px;
                border-radius: 12px;
            }

            .header .title-group h1 {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <div class="container">
        <!-- Card -->
        <div class="card">

            <!-- Status Badge -->
            <div class="status-badge" id="statusBadge">
                <span class="dot-mini connecting" id="badgeDot"></span>
                <span id="badgeText">Connecting</span>
            </div>

            <!-- Header -->
            <div class="header">
                <div class="logo">
                    <i class="fas fa-bolt"></i>
                </div>
                <div class="title-group">
                    <h1>Muzamil <span>MD</span></h1>
                    <p>WhatsApp Bot • Premium</p>
                </div>
            </div>

            <!-- Stats Row -->
            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-icon"><i class="fas fa-check-circle"></i></span>
                    <div class="stat-number" id="statStatus">-</div>
                    <div class="stat-label">Status</div>
                </div>
                <div class="stat-card">
                    <span class="stat-icon"><i class="fas fa-database"></i></span>
                    <div class="stat-number" id="statDb">-</div>
                    <div class="stat-label">Database</div>
                </div>
                <div class="stat-card">
                    <span class="stat-icon"><i class="fas fa-clock"></i></span>
                    <div class="stat-number" id="statUptime">-</div>
                    <div class="stat-label">Uptime</div>
                </div>
            </div>

            <!-- QR Code -->
            <div class="qr-section">
                <div class="qr-frame">
                    <img id="qrImage" src="" alt="QR Code" style="display:none;">
                    <div class="placeholder" id="qrPlaceholder">
                        <i class="fas fa-qrcode"></i>
                        <span>Scan to Connect</span>
                    </div>
                </div>
                <div class="qr-hint" id="qrHint">
                    <i class="fas fa-phone"></i> Open WhatsApp → <span class="highlight">Linked Devices</span> → Link a Device
                </div>
            </div>

            <!-- Session Info -->
            <div class="session-info">
                <div class="row">
                    <span class="label">Session ID</span>
                    <span class="value code" id="sessionIdDisplay">-</span>
                </div>
                <div class="row">
                    <span class="label">Device</span>
                    <span class="value" id="deviceInfo">-</span>
                </div>
                <div class="row">
                    <span class="label">Last Active</span>
                    <span class="value" id="lastActive">-</span>
                </div>
            </div>

            <!-- Buttons -->
            <div class="btn-group">
                <button class="btn btn-restart" id="restartBtn" onclick="restartBot()">
                    <i class="fas fa-sync-alt"></i> Restart Bot
                </button>
                <button class="btn btn-refresh" onclick="refreshStatus()">
                    <i class="fas fa-rotate"></i> Refresh
                </button>
            </div>
            <button class="btn btn-logout" onclick="logoutBot()">
                <i class="fas fa-sign-out-alt"></i> Logout Session
            </button>

        </div>

        <!-- Footer -->
        <div class="footer">
            Made with <i class="fas fa-heart"></i> by <a href="#">Muzamil</a> • v2.0
        </div>
    </div>

    <script>
        // ============================================
        // JAVASCRIPT
        // ============================================
        let statusInterval = null;
        let startTime = Date.now();

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            setTimeout(() => toast.classList.add('show'), 10);
            clearTimeout(toast._hideTimeout);
            toast._hideTimeout = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function formatUptime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            if (h > 0) return `${h}h ${m}m`;
            if (m > 0) return `${m}m ${s}s`;
            return `${s}s`;
        }

        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // --- Badge ---
                const dot = document.getElementById('badgeDot');
                const badgeText = document.getElementById('badgeText');
                let statusLabel = 'Offline';
                let dotClass = 'offline';

                if (data.connected) {
                    statusLabel = 'Online';
                    dotClass = 'online';
                } else if (data.qr) {
                    statusLabel = 'Scan QR';
                    dotClass = 'connecting';
                } else {
                    statusLabel = 'Offline';
                    dotClass = 'offline';
                }

                dot.className = `dot-mini ${dotClass}`;
                badgeText.textContent = statusLabel;

                // --- Stats ---
                document.getElementById('statStatus').textContent = data.connected ? '🟢' : '🔴';
                document.getElementById('statDb').textContent = data.dbConnected ? '✅' : '❌';
                document.getElementById('statUptime').textContent = formatUptime(Math.floor((Date.now() - startTime) / 1000));

                // --- QR ---
                const qrImg = document.getElementById('qrImage');
                const qrPlaceholder = document.getElementById('qrPlaceholder');
                const qrHint = document.getElementById('qrHint');

                if (data.qr) {
                    qrImg.src = data.qr;
                    qrImg.style.display = 'block';
                    qrPlaceholder.style.display = 'none';
                    qrHint.innerHTML = '<i class="fas fa-check-circle" style="color:var(--success);"></i> QR ready! <span class="highlight">Scan with WhatsApp</span>';
                } else {
                    qrImg.style.display = 'none';
                    qrPlaceholder.style.display = 'flex';
                    if (data.connected) {
                        qrHint.innerHTML = '<i class="fas fa-check-circle" style="color:var(--success);"></i> Bot is <span class="highlight">connected</span>!';
                    } else {
                        qrHint.innerHTML = '<i class="fas fa-clock"></i> Waiting for <span class="highlight">QR code</span>...';
                    }
                }

                // --- Session Info ---
                document.getElementById('sessionIdDisplay').textContent = data.sessionId || '-';
                document.getElementById('deviceInfo').textContent = data.connected ? 'Connected ✅' : '-';
                document.getElementById('lastActive').textContent = data.lastActive ? new Date(data.lastActive).toLocaleString() : new Date().toLocaleString();

                // --- Enable restart ---
                document.getElementById('restartBtn').disabled = false;

                return data;

            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('badgeDot').className = 'dot-mini offline';
                document.getElementById('badgeText').textContent = 'Error';
                showToast('Failed to fetch status', 'error');
                return null;
            }
        }

        function refreshStatus() {
            const btn = document.querySelector('.btn-refresh');
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;
            fetchStatus().finally(() => {
                btn.innerHTML = original;
                btn.disabled = false;
                showToast('Status updated', 'info');
            });
        }

        async function restartBot() {
            const btn = document.getElementById('restartBtn');
            const original = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> Restarting...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/restart', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('⚡ Bot restarting... Please wait', 'success');
                    setTimeout(() => {
                        fetchStatus();
                        showToast('✅ Bot restarted!', 'success');
                    }, 5000);
                } else {
                    showToast('❌ Restart failed: ' + (data.error || 'Unknown'), 'error');
                }
            } catch (e) {
                showToast('❌ Request failed: ' + e.message, 'error');
            } finally {
                btn.innerHTML = original;
                btn.disabled = false;
            }
        }

        async function logoutBot() {
            if (!confirm('⚠️ Logout will disconnect the bot. Are you sure?')) return;

            const btn = document.querySelector('.btn-logout');
            const original = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging out...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/logout', { method: 'POST' });
                const data = await res.json();
                if (data.success) {
                    showToast('👋 Logged out successfully', 'success');
                    setTimeout(fetchStatus, 2000);
                } else {
                    showToast('❌ Logout failed: ' + (data.error || 'Unknown'), 'error');
                }
            } catch (e) {
                showToast('❌ Request failed: ' + e.message, 'error');
            } finally {
                btn.innerHTML = original;
                btn.disabled = false;
            }
        }

        function startAutoRefresh() {
            if (statusInterval) clearInterval(statusInterval);
            fetchStatus();
            statusInterval = setInterval(fetchStatus, 10000);
        }

        document.addEventListener('DOMContentLoaded', startAutoRefresh);
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) fetchStatus();
        });
    </script>

</body>
</html>
