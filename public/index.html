<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Muzamil-MD • WhatsApp Bot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --whatsapp: #25d366;
            --whatsapp-dark: #128C7E;
            --whatsapp-gradient: linear-gradient(145deg, #25d366, #128C7E);
            --bg-dark: #0b1a1e;
            --bg-card: rgba(18, 34, 39, 0.95);
            --text-primary: #e9f1f2;
            --text-secondary: #8aa3a6;
            --border: rgba(37, 211, 102, 0.2);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --success: #25d366;
            --danger: #ff4757;
            --warning: #ffa502;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
        }
        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 32px 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            margin-bottom: 16px;
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: translateY(-2px);
        }
        
        /* Header */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }
        .header .icon {
            width: 72px;
            height: 72px;
            background: var(--whatsapp-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
            color: #fff;
            box-shadow: 0 0 40px rgba(37, 211, 102, 0.3);
        }
        .header h1 {
            font-size: 22px;
            font-weight: 800;
            background: var(--whatsapp-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Status Grid */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .status-item {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s ease;
        }
        .status-item .label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
            display: block;
            margin-bottom: 6px;
        }
        .status-item .value {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-item .value .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }
        .dot.online { background: var(--success); box-shadow: 0 0 12px rgba(37, 211, 102, 0.5); }
        .dot.offline { background: var(--danger); box-shadow: 0 0 12px rgba(255, 71, 87, 0.5); }
        .dot.connecting { background: var(--warning); box-shadow: 0 0 12px rgba(255, 165, 2, 0.5); animation: pulse 0.8s infinite; }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Database Status */
        .db-status {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .db-status .db-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .db-status .db-info i {
            font-size: 20px;
            color: var(--text-secondary);
        }
        .db-status .db-info .db-label {
            font-size: 13px;
            font-weight: 600;
        }
        .db-status .db-info .db-label small {
            display: block;
            font-weight: 400;
            color: var(--text-secondary);
            font-size: 11px;
            margin-top: 2px;
        }
        .db-status .db-badge {
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }
        .db-badge.connected {
            background: rgba(37, 211, 102, 0.2);
            color: var(--success);
            border: 1px solid rgba(37, 211, 102, 0.3);
        }
        .db-badge.disconnected {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        .db-badge.connecting {
            background: rgba(255, 165, 2, 0.2);
            color: var(--warning);
            border: 1px solid rgba(255, 165, 2, 0.3);
        }

        /* QR Code */
        .qr-section {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 12px;
        }
        .qr-section .qr-wrapper {
            display: inline-block;
            background: #fff;
            padding: 12px;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
        }
        .qr-section .qr-wrapper img {
            width: 200px;
            height: 200px;
            display: block;
            border-radius: 12px;
        }
        .qr-section .qr-hint {
            margin-top: 14px;
            font-size: 13px;
            color: var(--text-secondary);
        }
        .qr-section .qr-hint i {
            color: var(--whatsapp);
            margin-right: 6px;
        }

        /* Session Info */
        .session-info {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .session-info .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .session-info .row:last-child {
            border-bottom: none;
        }
        .session-info .row .label {
            color: var(--text-secondary);
        }
        .session-info .row .value {
            font-weight: 600;
            font-size: 12px;
            max-width: 60%;
            text-align: right;
            word-break: break-all;
        }
        .session-info .row .value.code {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Buttons */
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-restart {
            background: var(--whatsapp-gradient);
            color: #fff;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.3);
        }
        .btn-restart:hover {
            box-shadow: 0 6px 30px rgba(37, 211, 102, 0.5);
            transform: translateY(-2px);
        }
        .btn-restart:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-logout {
            background: rgba(255, 71, 87, 0.15);
            color: var(--danger);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }
        .btn-logout:hover {
            background: rgba(255, 71, 87, 0.25);
        }
        .btn-refresh {
            background: rgba(255,255,255,0.08);
            color: var(--text-primary);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-refresh:hover {
            background: rgba(255,255,255,0.14);
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 16px 0 8px;
            color: var(--text-secondary);
            font-size: 12px;
        }
        .footer i {
            color: var(--danger);
        }
        .footer a {
            color: var(--whatsapp);
            text-decoration: none;
            font-weight: 600;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.2);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            padding: 14px 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
        .toast.success { border-color: var(--success); color: var(--success); }
        .toast.error { border-color: var(--danger); color: var(--danger); }
        .toast.warning { border-color: var(--warning); color: var(--warning); }

        /* Responsive */
        @media (max-width: 480px) {
            .card { padding: 24px 16px; }
            .status-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
            .status-item { padding: 12px; }
            .status-item .value { font-size: 13px; }
            .qr-section .qr-wrapper img { width: 160px; height: 160px; }
            .btn-group { flex-direction: column; }
            .btn { padding: 16px; }
        }
    </style>
</head>
<body>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <div class="container">
        <!-- Main Card -->
        <div class="card">
            <!-- Header -->
            <div class="header">
                <div class="icon">
                    <i class="fab fa-whatsapp"></i>
                </div>
                <h1>Muzamil-MD</h1>
                <p>WhatsApp Bot • Auto-Forward System</p>
            </div>

            <!-- Status Grid -->
            <div class="status-grid">
                <div class="status-item">
                    <span class="label">Bot Status</span>
                    <div class="value" id="botStatus">
                        <span class="dot connecting"></span>
                        <span id="statusText">Connecting...</span>
                    </div>
                </div>
                <div class="status-item">
                    <span class="label">Session</span>
                    <div class="value" id="sessionId" style="font-size:12px; font-weight:600; color:var(--text-secondary);">
                        <i class="fas fa-id-card" style="font-size:14px;"></i>
                        <span id="sessionIdText">Loading...</span>
                    </div>
                </div>
            </div>

            <!-- Database Status -->
            <div class="db-status" id="dbStatus">
                <div class="db-info">
                    <i class="fas fa-database"></i>
                    <div class="db-label">
                        Database
                        <small id="dbHost">MongoDB</small>
                    </div>
                </div>
                <span class="db-badge connecting" id="dbBadge">
                    <i class="fas fa-spinner fa-spin"></i> Checking...
                </span>
            </div>

            <!-- QR Code -->
            <div class="qr-section" id="qrSection">
                <div class="qr-wrapper">
                    <img id="qrImage" src="" alt="QR Code" style="display:none;">
                    <div id="qrPlaceholder" style="width:200px;height:200px;display:flex;align-items:center;justify-content:center;background:#f0f0f0;border-radius:12px;color:#999;font-size:14px;text-align:center;padding:20px;">
                        <div>
                            <i class="fas fa-qrcode" style="font-size:48px;display:block;margin-bottom:12px;color:#ccc;"></i>
                            <span style="font-weight:600;">Scan to Connect</span>
                        </div>
                    </div>
                </div>
                <div class="qr-hint" id="qrHint">
                    <i class="fas fa-phone"></i> Open WhatsApp → Linked Devices → Link a Device
                </div>
            </div>

            <!-- Session Info -->
            <div class="session-info">
                <div class="row">
                    <span class="label"><i class="fas fa-fingerprint"></i> Session ID</span>
                    <span class="value code" id="sessionIdDisplay">-</span>
                </div>
                <div class="row">
                    <span class="label"><i class="fas fa-phone"></i> Phone Number</span>
                    <span class="value" id="phoneNumber">-</span>
                </div>
                <div class="row">
                    <span class="label"><i class="fas fa-clock"></i> Last Active</span>
                    <span class="value" id="lastActive">-</span>
                </div>
            </div>

            <!-- Buttons -->
            <div class="btn-group">
                <button class="btn btn-restart" id="restartBtn" onclick="restartBot()">
                    <i class="fas fa-sync-alt"></i> Restart Bot
                </button>
                <button class="btn btn-refresh" onclick="refreshStatus()">
                    <i class="fas fa-rotate"></i> Refresh
                </button>
            </div>
            <div style="margin-top:10px;">
                <button class="btn btn-logout" onclick="logoutBot()" style="width:100%;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            Made with <i class="fas fa-heart"></i> by <a href="#">Muzamil</a> • v1.0
        </div>
    </div>

    <script>
        let statusInterval = null;

        // Show Toast
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type}`;
            setTimeout(() => toast.classList.add('show'), 10);
            clearTimeout(toast._hideTimeout);
            toast._hideTimeout = setTimeout(() => toast.classList.remove('show'), 4000);
        }

        // Fetch Status
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // Update Bot Status
                const dot = document.querySelector('#botStatus .dot');
                const statusText = document.getElementById('statusText');
                
                if (data.connected) {
                    dot.className = 'dot online';
                    statusText.textContent = 'Online ✅';
                } else if (data.qr) {
                    dot.className = 'dot connecting';
                    statusText.textContent = 'Scan QR 📱';
                } else {
                    dot.className = 'dot offline';
                    statusText.textContent = 'Offline ❌';
                }

                // Update Session ID
                document.getElementById('sessionIdText').textContent = data.sessionId || 'N/A';
                document.getElementById('sessionIdDisplay').textContent = data.sessionId || '-';

                // Update QR Code
                const qrImg = document.getElementById('qrImage');
                const qrPlaceholder = document.getElementById('qrPlaceholder');
                if (data.qr) {
                    qrImg.src = data.qr;
                    qrImg.style.display = 'block';
                    qrPlaceholder.style.display = 'none';
                    document.getElementById('qrHint').innerHTML = '<i class="fas fa-check-circle" style="color:#25d366;"></i> QR Code ready! Scan with WhatsApp';
                } else {
                    qrImg.style.display = 'none';
                    qrPlaceholder.style.display = 'flex';
                    if (data.connected) {
                        document.getElementById('qrHint').innerHTML = '<i class="fas fa-check-circle" style="color:#25d366;"></i> Bot is connected!';
                    } else {
                        document.getElementById('qrHint').innerHTML = '<i class="fas fa-clock"></i> Waiting for QR code...';
                    }
                }

                // Update Phone Number (if available from session)
                // Note: You'll need to add this to your API
                // For now, just showing placeholder
                const phoneEl = document.getElementById('phoneNumber');
                if (data.phoneNumber) {
                    phoneEl.textContent = data.phoneNumber;
                } else if (data.connected) {
                    phoneEl.textContent = 'Connected ✅';
                } else {
                    phoneEl.textContent = '-';
                }

                // Update Last Active
                const lastActiveEl = document.getElementById('lastActive');
                if (data.lastActive) {
                    lastActiveEl.textContent = new Date(data.lastActive).toLocaleString();
                } else {
                    lastActiveEl.textContent = new Date().toLocaleString();
                }

                // Update Database Status
                updateDatabaseStatus(data);

                // Enable restart button
                document.getElementById('restartBtn').disabled = false;

                return data;

            } catch (error) {
                console.error('Error fetching status:', error);
                document.querySelector('#botStatus .dot').className = 'dot offline';
                document.getElementById('statusText').textContent = 'Error ⚠️';
                showToast('Failed to fetch status', 'error');
                return null;
            }
        }

        // Update Database Status
        function updateDatabaseStatus(data) {
            const dbBadge = document.getElementById('dbBadge');
            const dbHost = document.getElementById('dbHost');
            
            // Check if DB is connected (you can add this to your API)
            // For now, we'll check if mongoDbUrl exists in config
            const isDbConnected = data.dbConnected || false;
            
            if (isDbConnected) {
                dbBadge.className = 'db-badge connected';
                dbBadge.innerHTML = '<i class="fas fa-check-circle"></i> Connected';
                dbHost.textContent = 'MongoDB • Active';
            } else {
                // Check if DB is configured
                const isDbConfigured = data.dbConfigured || false;
                if (isDbConfigured) {
                    dbBadge.className = 'db-badge connecting';
                    dbBadge.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Connecting...';
                    dbHost.textContent = 'MongoDB • Connecting';
                } else {
                    dbBadge.className = 'db-badge disconnected';
                    dbBadge.innerHTML = '<i class="fas fa-times-circle"></i> Not Configured';
                    dbHost.textContent = 'MongoDB • Disabled';
                }
            }
        }

        // Refresh Status
        function refreshStatus() {
            const btn = document.querySelector('.btn-refresh');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';
            btn.disabled = true;
            
            fetchStatus().finally(() => {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                showToast('Status updated!', 'success');
            });
        }

        // Restart Bot
        async function restartBot() {
            const btn = document.getElementById('restartBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<span class="spinner"></span> Restarting...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/restart', { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    showToast('Bot restarting... Please wait 5-10 seconds', 'success');
                    // Refresh status after delay
                    setTimeout(() => {
                        fetchStatus();
                        showToast('Bot restarted successfully! ✅', 'success');
                    }, 5000);
                } else {
                    showToast('Restart failed: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showToast('Restart request failed: ' + error.message, 'error');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        // Logout Bot
        async function logoutBot() {
            if (!confirm('Are you sure you want to logout? This will disconnect the bot.')) return;
            
            try {
                const res = await fetch('/api/logout', { method: 'POST' });
                const data = await res.json();
                
                if (data.success) {
                    showToast('Logged out successfully!', 'success');
                    setTimeout(() => fetchStatus(), 2000);
                } else {
                    showToast('Logout failed: ' + (data.error || 'Unknown error'), 'error');
                }
            } catch (error) {
                showToast('Logout request failed: ' + error.message, 'error');
            }
        }

        // Auto-refresh every 10 seconds
        function startAutoRefresh() {
            if (statusInterval) clearInterval(statusInterval);
            fetchStatus();
            statusInterval = setInterval(fetchStatus, 10000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', startAutoRefresh);

        // Refresh on visibility change (when user comes back to tab)
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                fetchStatus();
            }
        });
    </script>

</body>
</html>
